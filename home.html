<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuukaa Search</title>
    <style>
        :root {
            /* Light theme */
            --bg-color: #ffffff;
            --text-color: #202124;
            --input-bg: #ffffff;
            --input-border: #dfe1e5;
            --input-border-hover: #dfe1e5;
            --input-shadow: rgba(32,33,36,0.28);
            --btn-bg: #f8f9fa;
            --btn-border: #f8f9fa;
            --btn-text: #3c4043;
            --btn-hover-border: #dadce0;
            --btn-hover-text: #202124;
        }

        [data-theme="dark"] {
            /* Dark theme */
            --bg-color: #202124;
            --text-color: #ffffff;
            --input-bg: #202124;
            --input-border: #5f6368;
            --input-border-hover: rgba(223,225,229,0);
            --input-shadow: rgba(32,33,36,0.28);
            --btn-bg: #303134;
            --btn-border: #303134;
            --btn-text: #e8eaed;
            --btn-hover-border: #5f6368;
            --btn-hover-text: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .logo {
            font-size: 90px;
            font-weight: bold;
            background: linear-gradient(45deg, #7c4dff, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            letter-spacing: -2px;
        }
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }
        .search-box {
            width: 100%;
            padding: 16px 25px 16px 45px;
            font-size: 16px;
            border-radius: 30px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .search-box:hover {
            box-shadow: 0 1px 6px var(--input-shadow);
            border-color: var(--input-border-hover);
        }
        .search-box:focus {
            box-shadow: 0 1px 6px var(--input-shadow);
            border-color: #7c4dff;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
            width: 20px;
            height: 20px;
        }
        .search-buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }
        .btn {
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-text);
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            border: 1px solid var(--btn-hover-border);
            color: var(--btn-hover-text);
        }
    </style>
</head>
<body data-theme="dark" id="bodyTheme">

    <div class="logo">Yuukaa</div>
    
    <div class="search-container">
        <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="search-icon"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        <input type="text" class="search-box" id="searchInput" placeholder="Telusuri Google atau ketik URL..." autofocus>
    </div>

    <div class="search-buttons">
        <button class="btn" onclick="search()">Penelusuran Yuukaa</button>
        <button class="btn" onclick="search()">Saya Lagi Beruntung</button>
    </div>

    <script>
        function search() {
            var query = document.getElementById('searchInput').value;
            if (query.trim() !== "") {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        // Theme management
        function setTheme(theme) {
            document.getElementById('bodyTheme').setAttribute('data-theme', theme);
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('theme') === 'light') {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        };
    </script>
</body>
</html>
