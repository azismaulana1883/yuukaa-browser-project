<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuukaa Search</title>
    <style>
        :root {
            /* Light theme */
            --bg-color: #ffffff;
            --text-color: #202124;
            --input-bg: #ffffff;
            --input-border: #dfe1e5;
            --input-border-hover: #dfe1e5;
            --input-shadow: rgba(32,33,36,0.28);
            --btn-bg: #f8f9fa;
            --btn-border: #f8f9fa;
            --btn-text: #3c4043;
            --btn-hover-border: #dadce0;
            --btn-hover-text: #202124;
        }

        [data-theme="dark"] {
            /* Dark theme */
            --bg-color: #202124;
            --text-color: #ffffff;
            --input-bg: #202124;
            --input-border: #5f6368;
            --input-border-hover: rgba(223,225,229,0);
            --input-shadow: rgba(32,33,36,0.28);
            --btn-bg: #303134;
            --btn-border: #303134;
            --btn-text: #e8eaed;
            --btn-hover-border: #5f6368;
            --btn-hover-text: #ffffff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
            z-index: 0;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        #bg-image-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            display: none;
        }

        #bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: -1;
            display: none;
        }
        .logo {
            font-size: 90px;
            font-weight: bold;
            background: linear-gradient(45deg, #7c4dff, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            letter-spacing: -2px;
        }
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }
        .search-box {
            width: 100%;
            padding: 16px 25px 16px 45px;
            font-size: 16px;
            border-radius: 30px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .search-box:hover {
            box-shadow: 0 1px 6px var(--input-shadow);
            border-color: var(--input-border-hover);
        }
        .search-box:focus {
            box-shadow: 0 1px 6px var(--input-shadow);
            border-color: #7c4dff;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 24px;
            transform: translateY(-50%);
            color: #9aa0a6;
            width: 20px;
            height: 20px;
        }
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-top: none;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 6px var(--input-shadow);
            margin-top: -10px;
            padding-top: 10px;
            overflow: hidden;
            z-index: 10;
            display: none;
        }
        .suggestion-item {
            padding: 10px 20px 10px 45px;
            cursor: pointer;
            text-align: left;
            color: var(--text-color);
            transition: background-color 0.2s;
        }
        .suggestion-item:hover, .suggestion-item.active {
            background-color: var(--btn-hover-border); /* using as highlight */
        }
        .search-buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }
        .btn {
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-text);
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            border: 1px solid var(--btn-hover-border);
            color: var(--btn-hover-text);
        }
    </style>
</head>
<body data-theme="dark" id="bodyTheme">
    <div id="bg-image-layer"></div>
    <div id="bg-overlay"></div>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bgPath = urlParams.get('bg');
            if (bgPath) {
                const bgLayer = document.getElementById('bg-image-layer');
                const bgOverlay = document.getElementById('bg-overlay');
                bgLayer.style.backgroundImage = `url('file:///${encodeURI(bgPath).replace(/'/g, "%27")}')`;
                bgLayer.style.display = 'block';
                bgOverlay.style.display = 'block';
                document.body.style.color = '#ffffff';
            }
        })();
    </script>

    <div class="logo">Yuukaa</div>
    
    <div class="search-container">
        <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="search-icon"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        <input type="text" class="search-box" id="searchInput" placeholder="Cari Sesuatu..." autocomplete="off" autofocus>
        <div id="suggestionsBox" class="suggestions-box"></div>
    </div>

    <div class="search-buttons">
        <button class="btn" onclick="search()">Penelusuran</button>
        <button class="btn" onclick="search()">Saya Lagi Beruntung</button>
    </div>

    <script>
        function search() {
            var query = document.getElementById('searchInput').value;
            if (query.trim() !== "") {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        // --- Suggestions Logic ---
        let currentFocus = -1;
        
        // JSONP Callback
        function handleSuggestions(data) {
            const suggestions = data[1];
            const box = document.getElementById('suggestionsBox');
            box.innerHTML = '';
            
            if (suggestions.length === 0) {
                box.style.display = 'none';
                return;
            }
            
            suggestions.forEach((sugg, index) => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = sugg;
                div.onclick = function() {
                    document.getElementById('searchInput').value = sugg;
                    box.style.display = 'none';
                    search();
                };
                box.appendChild(div);
            });
            box.style.display = 'block';
            currentFocus = -1;
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const val = this.value;
            const box = document.getElementById('suggestionsBox');
            if (!val) {
                box.style.display = 'none';
                return;
            }
            
            // Inject script for JSONP
            const scriptId = 'jsonp-suggest';
            let oldScript = document.getElementById(scriptId);
            if (oldScript) oldScript.remove();
            
            const script = document.createElement('script');
            script.id = scriptId;
            script.src = `http://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(val)}&callback=handleSuggestions`;
            document.body.appendChild(script);
        });

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            const box = document.getElementById('suggestionsBox');
            if (box.style.display !== 'block') return;
            
            const items = box.getElementsByTagName('div');
            if (e.key === 'ArrowDown') {
                currentFocus++;
                addActive(items);
            } else if (e.key === 'ArrowUp') {
                currentFocus--;
                addActive(items);
            } else if (e.key === 'Enter') {
                if (currentFocus > -1 && items[currentFocus]) {
                    e.preventDefault();
                    items[currentFocus].click();
                }
            }
        });

        function addActive(items) {
            if (!items) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = (items.length - 1);
            items[currentFocus].classList.add('active');
            // Scroll to view if needed
            items[currentFocus].scrollIntoView({ block: 'nearest' });
        }

        function removeActive(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
            }
        }

        document.addEventListener('click', function(e) {
            if (e.target.id !== 'searchInput') {
                document.getElementById('suggestionsBox').style.display = 'none';
            }
        });
        // -------------------------

        // Theme management
        function setTheme(theme) {
            document.getElementById('bodyTheme').setAttribute('data-theme', theme);
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('theme') === 'light') {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        };
    </script>
</body>
</html>
